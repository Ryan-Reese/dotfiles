[mcp_servers.maas_sharepoint]
url = "https://maas.prd.astra.nvidia.com/maas/sharepoint/mcp"

[mcp_servers.maas_slack]
url = "https://maas.stg.astra.nvidia.com/maas/slack/mcp"

