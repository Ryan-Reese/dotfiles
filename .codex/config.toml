model = "gpt-5.5"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
service_tier = "fast"
approvals_reviewer = "guardian_subagent"
[projects."/Users/ryreese/Documents/nvidia/nvalchemi-toolkit"]
trust_level = "trusted"

[projects."/Users/ryreese/Documents/nvidia/alchemi-playbook"]
trust_level = "trusted"

[projects."/Users/ryreese/dotfiles"]
trust_level = "trusted"

[projects."/Users/ryreese/Documents/nvidia/academic-grants"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true

[plugins."life-science-research@openai-curated"]
enabled = true

[plugins."slack@openai-curated"]
enabled = true

[tui]
status_line = ["model-with-reasoning", "fast-mode", "context-used", "current-dir", "git-branch", "five-hour-limit"]

[tui.keymap.global]
copy = "ctrl-t"
open_transcript = "ctrl-o"

[tui.keymap.editor]
insert_newline = ["ctrl-j", "ctrl-m", "enter", "shift-enter", "alt-enter"]

[tui.model_availability_nux]
"gpt-5.5" = 3

[mcp_servers.maas_gitlab]
url = "https://maas.prd.astra.nvidia.com/maas/gitlab/mcp"

[mcp_servers.maas_outlook]
url = "https://maas.prd.astra.nvidia.com/maas/outlook/mcp"

[mcp_servers.maas_gdrive]
url = "https://maas.prd.astra.nvidia.com/maas/gdrive/mcp"

[mcp_servers.maas_onedrive]
url = "https://maas.prd.astra.nvidia.com/maas/onedrive/mcp"

[mcp_servers.maas_confluence]
